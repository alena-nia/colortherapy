<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Chroma — Color Therapy</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="stylesheet" href="styles.css" />

<div id="stage"></div>
<div id="dim"></div>

<div id="hint" class="hint">tap anywhere to show or hide controls</div>

<div id="controls" class="controls hidden">
  <div id="countdown" class="countdown hidden"></div>

  <div class="modes" id="modes"></div>

  <div class="label">Palette</div>
  <div class="row chips" id="palettes"></div>

  <div class="row slider">
    <span class="s-label">Speed</span>
    <input type="range" id="pace" min="0" max="100" />
    <span class="s-val" id="paceVal"></span>
  </div>

  <div class="row slider">
    <span class="s-label">Brightness</span>
    <input type="range" id="bright" min="20" max="100" />
  </div>

  <div class="label">Session</div>
  <div class="row chips" id="timers"></div>

  <div class="row">
    <button class="wide" id="fsBtn">Enter full screen</button>
  </div>
</div>

<div id="done" class="done hidden">
  <p>Session complete</p>
  <button id="restartBtn">Start again</button>
</div>

<script src="app.js"></script>
